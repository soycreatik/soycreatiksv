<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creatik - Tu historia es única</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET Y PROTECCIÓN ANTICOPIA --- */
        *, *::before, *::after { box-sizing: border-box; }
        
        body {
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
            margin: 0; padding: 0; max-width: 100vw; overflow-x: hidden !important; 
            position: relative; scroll-behavior: smooth; background-color: #020005; 
            background-image: radial-gradient(circle at 50% 110%, rgba(107, 33, 168, 0.5) 0%, rgba(30, 10, 50, 0.6) 50%, #020005 90%);
            background-attachment: fixed; color: #ffffff; font-family: 'Inter', sans-serif;
            min-height: 200vh; -webkit-font-smoothing: antialiased;
        }

        img { -webkit-user-drag: none; }
        .paused-animation, .paused-animation * { animation-play-state: paused !important; }

        /* --- INTRO LOADER --- */
        #intro-loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; display: flex; justify-content: center; align-items: center;
            z-index: 99999; transition: opacity 0.8s ease, visibility 0.8s; opacity: 1;
        }
        .intro-logo { font-family: 'Inter', sans-serif; font-size: 3.5rem; font-weight: 800; color: white; display: flex; }
        .intro-logo span { display: inline-block; opacity: 0; transform: translate3d(0, 10px, 0); }
        .animate-letters span { animation: letterEntry 0.4s forwards; }
        .intro-logo .c { animation-delay: 0.2s; } .intro-logo .r { animation-delay: 0.3s; }
        .intro-logo .e { animation-delay: 0.4s; } .intro-logo .a { animation-delay: 0.5s; }
        .intro-logo .t { animation-delay: 0.7s; } .intro-logo .i { animation-delay: 0.8s; }
        .intro-logo .k { animation-delay: 0.9s; }
        @keyframes letterEntry { to { opacity: 1; transform: translate3d(0, 0, 0); } }
        #intro-loader.hidden { opacity: 0; visibility: hidden; }

        /* --- FONDOS --- */
        #bg-presentation { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 0; pointer-events: none; overflow: hidden; }
        .bg-slide { position: absolute; top: 0; left: -10%; width: 120%; height: 100%; background-size: cover; background-position: center; opacity: 0; filter: blur(4px) brightness(0.4); animation: slideAnimation 16s infinite linear; }
        @keyframes slideAnimation { 0% { opacity: 0; } 10% { opacity: 0.15; } 40% { opacity: 0.15; } 50% { opacity: 0; } 100% { opacity: 0; } }
        .slide-1 { background-image: url('FONDOS/_DSC7958.jpg'); animation-delay: 0s; }
        .slide-2 { background-image: url('FONDOS/DSC03921.jpg'); animation-delay: 8s; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E'); opacity: 0.5; mix-blend-mode: overlay; pointer-events: none; z-index: 2; }
        .cursor-glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 60%); border-radius: 50%; top: 0; left: 0; pointer-events: none; z-index: 1; will-change: transform; transform: translate3d(-50%, -50%, 0); }

        /* --- HEADER --- */
        header { position: fixed; top: 0; width: 100%; z-index: 10000; display: flex; justify-content: space-between; align-items: center; padding: 20px 3vw; transition: 0.4s; }
        .logo-img { height: 45px; cursor: pointer; transition: 0.3s; margin-left: -10px; }
        .logo-img:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.6)); }
        .nav-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        header.menu-mode .academy-btn, header.menu-mode .nav-right { display: none !important; }
        .menu-btn, .academy-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 20px; color: white; cursor: pointer; backdrop-filter: blur(10px); font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; transition: 0.3s;}
        .academy-btn { border-color: rgba(168, 85, 247, 0.3); color: #d8b4fe; }
        .menu-btn .dot { width: 6px; height: 6px; background-color: #f97316; border-radius: 50%; box-shadow: 0 0 8px #f97316; transition: 0.3s; }
        .menu-btn.active-btn .dot { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .menu-btn:hover, .academy-btn:hover { background: rgba(255,255,255,0.15); border-color: #a855f7; }
        .nav-right a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.7; transition: 0.3s; }
        .nav-right a:hover { opacity: 1; }
        .btn-demo-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .btn-demo-outline:hover { background: white; color: black; border-color: white; }

        /* --- STICKER PAQUETES --- */
        .overlay-fixed-logo {
            position: fixed; top: 15px; left: 1.5vw; height: 90px; 
            z-index: 99999; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)); cursor: pointer; transition: 0.3s;
        }
        .overlay-fixed-logo:hover { transform: scale(1.05) rotate(-5deg); }
        .overlay-fixed-close {
            position: fixed; top: 25px; right: 3vw; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px 25px; border-radius: 30px; cursor: pointer; backdrop-filter: blur(10px); z-index: 99999; font-weight: bold; font-size: 0.85rem; transition: 0.3s; }
        .overlay-fixed-close:hover { background: rgba(255,255,255,0.1); border-color: #db2777; color: #db2777; }

        /* --- CHATBOT UI (Z-INDEX CORREGIDO) --- */
        #chatbot-fab {
            position: fixed; bottom: 40px; right: 4vw; width: 65px; height: 65px;
            background: linear-gradient(135deg, #a855f7, #db2777); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; z-index: 100001;
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.4); cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s, visibility 0.4s;
            animation: pulseFab 2.5s infinite;
        }
        #chatbot-fab:hover { transform: scale(1.1); animation: none; box-shadow: 0 15px 35px rgba(219, 39, 119, 0.6); }
        @keyframes pulseFab { 0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(219, 39, 119, 0); } 100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }

        .new-message-indicator {
            position: absolute; top: 0; right: 0; width: 18px; height: 18px;
            background-color: #ff3b30; border-radius: 50%; border: 2px solid #ffffff;
            display: none; z-index: 100003; animation: pulseIndicator 1.5s infinite;
        }
        @keyframes pulseIndicator { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        #chatbot-fab.has-new-message .new-message-indicator { display: block; }

        #chatbot-window {
            position: fixed; bottom: 120px; right: 4vw; width: 360px; max-width: 90vw; height: 550px; max-height: 75vh;
            background: rgba(15, 10, 25, 0.95); border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 30px rgba(168, 85, 247, 0.2);
            display: flex; flex-direction: column; z-index: 100002; overflow: hidden;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            opacity: 0; visibility: hidden; transform: translateY(30px) scale(0.9);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.4s;
            transform-origin: bottom right; pointer-events: none; 
        }
        #chatbot-window.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); pointer-events: auto; }

        .chatbot-header { display: flex; align-items: center; padding: 18px 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.08); gap: 15px; position: relative; }
        .chatbot-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
        .chatbot-title { flex: 1; }
        .chatbot-title h4 { margin: 0; font-size: 1.1rem; color: #fff; letter-spacing: 0.5px; }
        .chatbot-title span { font-size: 0.75rem; color: #10b981; display: flex; align-items: center; gap: 5px; margin-top: 3px; font-weight: 600; }
        .chatbot-title span::before { content: ''; width: 8px; height: 8px; background: currentColor; border-radius: 50%; box-shadow: 0 0 8px currentColor; animation: blinkOnline 2s infinite; }
        
        #close-chatbot-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; transition: 0.3s; font-size: 0.9rem; margin-left: auto; z-index: 100;
        }
        #close-chatbot-btn:hover { background: rgba(219, 39, 119, 0.5); border-color: #db2777; transform: scale(1.1); }

        .chatbot-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scrollbar-width: thin; scrollbar-color: rgba(168, 85, 247, 0.3) transparent; }
        .chatbot-messages::-webkit-scrollbar { width: 5px; }
        .chatbot-messages::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }

        .message { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 0.9rem; line-height: 1.5; word-wrap: break-word; animation: msgEntry 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: translateY(15px) scale(0.95); }
        @keyframes msgEntry { to { opacity: 1; transform: translateY(0) scale(1); } }
        .bot-message { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .user-message { background: linear-gradient(135deg, #a855f7, #6b21a8); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3); border: 1px solid rgba(168, 85, 247, 0.5); }
        
        .typing-indicator { display: flex; gap: 5px; padding: 5px; }
        .typing-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.6); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; }
        .typing-dot:nth-child(1) { animation-delay: 0s; } .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); background: #a855f7; box-shadow: 0 0 5px #a855f7; } }

        .chatbot-input-area { padding: 15px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 12px; align-items: center; }
        #chatbot-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 25px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: 0.3s; }
        #chatbot-input:focus { border-color: #a855f7; background: rgba(255,255,255,0.08); box-shadow: inset 0 0 10px rgba(168, 85, 247, 0.1); }
        #chatbot-input:disabled { opacity: 0.5; cursor: not-allowed; }
        #chatbot-send-btn { background: linear-gradient(135deg, #a855f7, #db2777); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); flex-shrink: 0; }
        #chatbot-send-btn:hover { transform: scale(1.1) rotate(-10deg); box-shadow: 0 8px 20px rgba(219, 39, 119, 0.6); }
        #chatbot-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- HERO SECTION --- */
        .hero-section { min-height: 85vh; display: flex; justify-content: space-between; align-items: center; padding: 80px 5vw 40px 5vw; z-index: 3; position: relative; width: 100%; box-sizing: border-box; }
        .side-text { width: 250px; font-size: 0.85rem; line-height: 1.6; color: rgba(255, 255, 255, 0.6); }
        .center-hero { display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1; max-width: 100%; }
        .dynamic-title-container { position: relative; height: 140px; width: 100%; display: flex; justify-content: center; }
        .title-group { position: absolute; top: 0; display: flex; flex-direction: column; align-items: center; width: 100%; opacity: 0; transform: translate3d(0, -15px, 0); filter: blur(8px); transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease; pointer-events: none; will-change: transform, opacity; }
        .title-group h1 { font-size: 4.5rem; margin: 0; font-weight: 700; letter-spacing: -2px; white-space: nowrap; }
        .title-group h2 { font-size: 1.5rem; margin: 0 0 20px 0; font-weight: 400; }
        .title-group.active { opacity: 1; filter: blur(0px); transform: translate3d(0, 0, 0); }
        
        .text-box-container { position: relative; height: 100px; margin-bottom: 40px; display: flex; justify-content: center; align-items: center; z-index: 10; cursor: pointer; border-radius: 12px; margin-left: auto; margin-right: auto; transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); min-width: 150px; }
        .text-box-container:hover { transform: scale(1.05); transition: transform 0.2s ease; }
        .glow-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; backdrop-filter: blur(12px); z-index: -1; }
        .world-text { font-family: 'Pacifico', cursive; font-size: 3.5rem; color: #ffffff; text-shadow: 0px 4px 15px rgba(255, 255, 255, 0.3); position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.85); opacity: 0; filter: blur(8px); transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease; white-space: nowrap; pointer-events: none; }
        .world-text.active { opacity: 1; filter: blur(0px); transform: translate(-50%, -50%) scale(1); }
        
        .btn-demo-glow { background: linear-gradient(90deg, #6b21a8, #a855f7); border: none; color: white; padding: 10px 35px; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(168, 85, 247, 0.5); transition: transform 0.2s ease; margin-bottom: 20px; }
        .btn-demo-glow:hover { transform: scale(1.05); }
        .bottom-slogan { display: none; }

        /* --- MARQUEE INFINITO --- */
        .marquee-wrapper { width: 100%; overflow: hidden; background: rgba(0, 0, 0, 0.15); padding: 30px 0; position: relative; z-index: 3; border-top: 1px solid rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-wrap: nowrap; pointer-events: none; transform: translateZ(0); }
        .marquee-content { display: flex; flex-shrink: 0; width: max-content; align-items: center; animation: marqueeFlow 25s linear infinite; will-change: transform; backface-visibility: hidden; }
        .marquee-img { height: 32px; width: auto; margin: 0 60px; display: block; opacity: 0.9; flex-shrink: 0; max-width: none; }
        .overlay-marquee { width: 100%; overflow: hidden; padding: 50px 0; position: relative; z-index: 5; background: rgba(0, 0, 0, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-wrap: nowrap; pointer-events: none; transform: translateZ(0); }
        @keyframes marqueeFlow { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* --- OVERLAYS CONFIGURACIÓN --- */
        #full-menu-overlay, #paquetes-overlay, #academy-overlay, #contact-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9000; opacity: 0; visibility: hidden; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
            display: flex; flex-direction: column; align-items: center; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
        }
        #full-menu-overlay { background: radial-gradient(circle at 50% 80%, #0a0f24 0%, #030409 60%); }
        #paquetes-overlay { background-color: #050505; background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 50px 50px; }
        #academy-overlay { background: #0a0a0a; justify-content: center; }
        #contact-overlay { background-color: #020005; z-index: 99000; transform: perspective(1000px) rotateX(15deg) translateY(80px) scale(0.95); transition: opacity 0.7s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 0.8s; }
        #full-menu-overlay::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        #full-menu-overlay.active, #paquetes-overlay.active, #academy-overlay.active { opacity: 1; visibility: visible; }
        #contact-overlay.active { opacity: 1; visibility: visible; transform: perspective(1000px) rotateX(0deg) translateY(0) scale(1); filter: blur(0px); }

        /* --- ACADEMY SECCIÓN --- */
        .academy-section { width: 90%; max-width: 1100px; margin: auto; display: flex; align-items: center; justify-content: space-between; gap: 40px; background: rgba(20, 10, 30, 0.85); border: 1px solid rgba(255, 50, 50, 0.3); border-radius: 30px; padding: 60px; position: relative; z-index: 5; box-shadow: 0 0 40px rgba(255, 50, 50, 0.1), inset 0 0 30px rgba(20, 10, 30, 0.8); backdrop-filter: blur(20px); overflow: hidden; }
        .academy-section::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(135deg, transparent 45%, rgba(255, 20, 60, 0.1) 50%, transparent 55%); background-size: 30px 30px, 30px 30px, 200% 200%; pointer-events: none; z-index: 0; animation: techScan 12s linear infinite; }
        @keyframes techScan { 0% { background-position: 0 0, 0 0, 0% 0%; } 100% { background-position: 0 0, 0 0, 100% 100%; } }
        .academy-card { flex: 1; background: rgba(40, 40, 50, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #ff3232; border-radius: 20px; padding: 40px; position: relative; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .academy-badge { display: inline-block; background: rgba(255, 50, 50, 0.15); border: 1px solid #ff3232; color: #ff9090; font-size: 0.75rem; font-weight: 800; padding: 6px 15px; border-radius: 50px; margin-bottom: 20px; letter-spacing: 1px; }
        .academy-card h2 { font-size: 2.8rem; font-weight: 900; line-height: 1; margin: 0 0 20px 0; color: #ffffff; letter-spacing: -1px; }
        .academy-card h2 span { color: #ff3232; font-family: 'Pacifico', cursive; font-weight: 300; font-size: 3.2rem; }
        .academy-card p { font-size: 0.95rem; color: rgba(255, 255, 255, 0.8); line-height: 1.7; }
        .academy-visuals { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; z-index: 2; }
        .dual-slide-wrap { width: 100%; max-width: 500px; aspect-ratio: 4 / 3; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(255, 50, 50, 0.3); border: 3px solid rgba(255, 50, 50, 0.6); background: #000; }
        .fade-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .fade-img.active { opacity: 1; z-index: 2; }

        /* --- DASHBOARD --- */
        .dashboard-container { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 30px; width: 90%; max-width: 1200px; margin: 60px auto 100px auto; padding: 50px; background: rgba(30, 10, 50, 0.2); border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 40px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 30px 60px rgba(0,0,0,0.6); transform: translate3d(0, 100px, 0); opacity: 0; transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 1s ease; z-index: 3; position: relative; }
        .dashboard-container.visible { transform: translate3d(0, 0, 0); opacity: 1; }
        .dash-left h2 { font-size: 3rem; line-height: 0.9; margin-bottom: 20px; font-weight: 800; letter-spacing: -1px;}
        .glass-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; overflow: hidden; width: 100%; box-sizing: border-box; }
        .viewer-box { width: 100%; height: 250px; border-radius: 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        #main-viewer { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; opacity: 0; transition: opacity 0.4s ease-in-out; object-position: center top; }
        .idea-container { text-align: center; margin-bottom: 20px; }
        .idea-box { background: linear-gradient(90deg, #a855f7, #6b21a8); color: white; font-size: 0.8rem; font-weight: bold; padding: 5px 15px; border-radius: 5px; display: inline-block; margin-bottom: 5px; }
        .nosotros-text { font-size: 3rem; font-weight: 900; color: #ffffff; margin: 0; line-height: 0.9; }
        .creamos-text { font-size: 3rem; font-weight: 900; color: #ffffff; margin: 0; line-height: 0.9; background: linear-gradient(to bottom, #ffffff 50%, #e0e0e0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .icon-box { aspect-ratio: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: all 0.4s ease-in-out; }
        .icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .service-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); padding: 14px 20px; border-radius: 50px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: pointer; font-size: 0.8rem; font-weight: 700; text-decoration: none; color: #ffffff; width: 100%; box-sizing: border-box; }
        .service-item:hover { transform: translate3d(10px, 0, 0); background: rgba(255,255,255,0.06); }
        .dot-icon { width: 32px; height: 32px; border-radius: 50%; background: #a855f7; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px #a855f7; flex-shrink: 0; }
        .dot-icon img { width: 60%; height: 60%; object-fit: contain; }

        /* --- PRECIOS PC --- */
        .pricing-section { position: relative; padding: 40px 1vw 150px 1vw; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: visible; }
        .pricing-header { text-align: center; margin-bottom: 50px; position: relative; z-index: 5; }
        .pricing-header h2 { font-family: 'Pacifico', cursive; color: #db2777; font-size: 4rem; margin: 0; text-transform: uppercase; }
        .pricing-header p { font-size: 1.5rem; font-weight: 700; margin-top: -10px; text-transform: uppercase; letter-spacing: 3px; }
        .plans-container { display: flex; justify-content: center; align-items: stretch; gap: 1vw; width: 100%; max-width: 1700px; position: relative; z-index: 5; flex-wrap: nowrap; padding: 40px 15px; }
        .plan-card { background: rgba(15, 15, 20, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px 12px; flex: 1 1 0; min-width: 0; text-align: center; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.4s, border-color 0.4s, box-shadow 0.4s; position: relative; backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: space-between; z-index: 1; }
        .plan-card:hover { transform: scale(1.12) translate3d(0, -10px, 0); background: rgba(25, 25, 30, 1); border-color: rgba(219, 39, 119, 0.8); z-index: 50; box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 20px rgba(219, 39, 119, 0.3); }
        .plan-card.popular { border: 2px solid #ffd700; box-shadow: 0 0 40px rgba(255, 215, 0, 0.15); z-index: 10; }
        .popular-sticker { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #ffd700; color: #000; font-weight: 900; font-size: 0.6rem; padding: 4px 10px; border-radius: 5px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); white-space: nowrap; }
        .plan-name { font-size: 0.7rem; font-weight: 800; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px; text-transform: uppercase; height: 35px; display: flex; align-items: center; justify-content: center; line-height: 1.1; }
        .plan-time { font-size: 0.65rem; color: #ffd700; font-weight: 600; margin-bottom: 12px; }
        .plan-price { font-size: 1.9rem; font-weight: 900; color: #db2777; margin-bottom: 2px; font-family: 'Inter', sans-serif; }
        .plan-deposit { font-size: 0.6rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .plan-features { list-style: none; padding: 0; text-align: left; margin-bottom: 20px; flex-grow: 1; }
        .plan-features li { font-size: 0.65rem; margin-bottom: 10px; color: rgba(255, 255, 255, 0.8); display: flex; align-items: flex-start; gap: 5px; line-height: 1.2; }
        .plan-features li::before { content: '✓'; color: #db2777; font-weight: bold; }
        .btn-plan { background: transparent; border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 10px 0; width: 100%; border-radius: 30px; font-weight: 700; font-size: 0.65rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .popular .btn-plan { background: #ffd700; color: #000; border: none; }
        .btn-plan:hover { background: #fff; color: #000; }

        @media (max-width: 900px) {
            .text-box-container { height: 80px !important; margin: 0 auto 30px auto !important; min-width: 120px !important; }
            #chatbot-fab { bottom: 20px; right: 20px; width: 55px; height: 55px; }
            #chatbot-window { bottom: 85px; right: 5vw; width: 90vw; height: 450px; border-radius: 15px; }
        }
    </style>
</head>
<body>

    <div id="intro-loader">
        <div class="intro-logo" id="intro-text">
            <span class="c">c</span><span class="r">r</span><span class="e">e</span><span class="a">a</span><span class="t">t</span><span class="i">i</span><span class="k">k</span>
        </div>
    </div>

    <div id="bg-presentation">
        <div class="bg-slide slide-1" data-animate="true"></div>
        <div class="bg-slide slide-2" data-animate="true"></div>
        <div class="smoke-overlay"></div>
    </div>

    <div class="cursor-glow"></div>

    <header id="main-header">
        <img fetchpriority="high" src="LOGO MULTIMEDIA ISOTIPO MORA CREATIK.png" alt="creatik" class="logo-img" id="header-logo" onclick="triggerIntro()">
        <div class="nav-center">
            <div class="menu-btn" id="toggle-menu-btn"><span class="dot"></span> Menú</div>
            <div class="academy-btn" id="open-academy-btn">Academy</div>
        </div>
        <div class="nav-right">
            <a href="#">Login</a>
            <button class="btn-demo-outline" id="toggle-paquetes-btn">PAQUETES</button>
        </div>
    </header>

    <div id="chatbot-fab" title="Chatea con nosotros">
        <div class="new-message-indicator"></div>
        <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"></path></svg>
    </div>

    <div id="chatbot-window">
        <div class="chatbot-header">
            <img src="creatikperfil.jpg" alt="Creatik Bot" class="chatbot-logo" onerror="this.src='https://i.pravatar.cc/100?img=12'">
            <div class="chatbot-title">
                <h4>Creatik IA</h4>
                <span id="bot-status">En línea</span>
            </div>
            <button id="close-chatbot-btn">✖</button>
        </div>
        <div class="chatbot-messages" id="chatbot-messages">
            <div class="message bot-message">¡Hola! 👋 Soy la IA de Creatik. ¿En qué te ayudo a contar tu historia hoy?</div>
        </div>
        <div class="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Escribe tu mensaje..." autocomplete="off">
            <button id="chatbot-send-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <main class="hero-section" id="main-content-area">
        <div class="center-hero">
            <div class="dynamic-title-container">
                <div class="title-group" id="title-historia"><h1>Tu historia</h1><h2>es</h2></div>
                <div class="title-group" id="title-hagamos"><h1>Hagamos</h1><h2>que sea</h2></div>
            </div>
            <div class="text-box-container" id="dynamic-box">
                <div class="glow-background"></div>
                <span class="world-text">única</span>
                <span class="world-text">memorable</span>
                <span class="world-text">eterna</span>
                <span class="world-text">inolvidable</span>
            </div>
            <button class="btn-demo-glow" id="btn-contact-open">Contáctanos</button>
        </div>
    </main>

    <script>
        // --- BLOQUEO ANTICOPIA ---
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());

        // --- LÓGICA DEL CHATBOT ---
        const chatbotFab = document.getElementById('chatbot-fab');
        const chatbotWindow = document.getElementById('chatbot-window');
        const closeChatbotBtn = document.getElementById('close-chatbot-btn');
        const chatbotInput = document.getElementById('chatbot-input');
        const chatbotSendBtn = document.getElementById('chatbot-send-btn');
        const chatbotMessages = document.getElementById('chatbot-messages');
        
        let isChatbotOpen = false;
        let userMessageCount = 0;
        let lastTopic = 'inicio'; 
        const MAX_MESSAGES = 60;
        
        const botResponses = {
            asesoria: [
                "¡Con gusto! Para darte la mejor recomendación, ¿cuál es tu rango de presupuesto aproximado? ✨<div style='margin-top:10px;'><button class='chat-option-btn' style='display:block; width:100%; margin-bottom:5px; padding:10px; background:rgba(168,85,247,0.2); border:1px solid #a855f7; color:white; border-radius:10px; cursor:pointer;' onclick='sendChatOption(\"Bajo ($50-$75)\")'>Bajo ($50-$75)</button><button class='chat-option-btn' style='display:block; width:100%; margin-bottom:5px; padding:10px; background:rgba(168,85,247,0.2); border:1px solid #a855f7; color:white; border-radius:10px; cursor:pointer;' onclick='sendChatOption(\"Medio ($100-$125)\")'>Medio ($100-$125)</button><button class='chat-option-btn' style='display:block; width:100%; padding:10px; background:rgba(168,85,247,0.2); border:1px solid #a855f7; color:white; border-radius:10px; cursor:pointer;' onclick='sendChatOption(\"Pro ($170+)\")'>Pro ($170+)</button></div>"
            ],
            rango_basico: [
                "Para un presupuesto de $50 a $75, te recomiendo la **Sesión Personal** ($50) o el **Evento Small** ($75). ¡Son ideales para recuerdos rápidos y de alta calidad! 📸<br><br>Si quieres agendar, escríbenos aquí: <b><a href='https://wa.me/50375778333' target='_blank' style='color:#a855f7; text-decoration:none;'>WhatsApp Creatik</a></b>"
            ],
            rango_medio: [
                "Con ese presupuesto, el **Paquete Intermedio ($100)** es tu mejor aliado, ¡es el favorito porque ya incluye video! También tienes el **Emprendimiento Pro ($125)** para marcas. 🚀<br><br>¿Te gustaría reservar? Escríbenos: <b><a href='https://wa.me/50375778333' target='_blank' style='color:#a855f7; text-decoration:none;'>WhatsApp Creatik</a></b>"
            ],
            rango_pro: [
                "¡Vas por el resultado nivel cine! El **Paquete Express ($170)** es el más completo, incluye asistente y video para tus redes. 💎<br><br>Hablemos por WhatsApp para asegurar tu fecha: <b><a href='https://wa.me/50375778333' target='_blank' style='color:#a855f7; text-decoration:none;'>WhatsApp Creatik</a></b>"
            ],
            saludo: ["¡Hola! Qué alegría verte por acá. ¿En qué te ayudo hoy? 😊", "¡Hola, hola! 📸 ¿Listo para crear algo inolvidable?"],
            contacto: ["¡Claro! Un asesor humano te espera en nuestro WhatsApp: <b><a href='https://wa.me/50375778333' target='_blank' style='color:#a855f7; text-decoration:none;'>+503 7577 8333</a></b>."],
            default: ["Mmm, no estoy seguro de entenderte, pero si buscas info de precios escribe **Asesoría** o mándanos un **WhatsApp** para contratar. 📱"]
        };

        const intents = [
            { name: 'asesoria', regex: "\\b(asesoria|asesorame|ayudame a elegir|recomiendame|ayuda)\\b" },
            { name: 'rango_basico', regex: "\\b(bajo|economico|50|75)\\b" },
            { name: 'rango_medio', regex: "\\b(medio|intermedio|100|125)\\b" },
            { name: 'rango_pro', regex: "\\b(pro|alto|express|170)\\b" },
            { name: 'saludo', regex: "\\b(hola|holas|buenos dias|buenas tardes|hey)\\b" },
            { name: 'contacto', regex: "\\b(whatsapp|contratar|agendar|numero|hablar con alguien)\\b" }
        ];

        window.sendChatOption = function(text) {
            chatbotInput.value = text;
            handleSend();
        };

        function getBotResponse(input) {
            let cleanInput = input.toLowerCase().trim();
            for (let i = 0; i < intents.length; i++) {
                if (new RegExp(intents[i].regex, "i").test(cleanInput)) return botResponses[intents[i].name][0];
            }
            return botResponses.default[0];
        }

        function handleSend() {
            if (chatbotSendBtn.disabled) return;
            const text = chatbotInput.value.trim();
            if (!text) return;
            appendMessage('user', text);
            chatbotInput.value = '';
            chatbotInput.disabled = true; chatbotSendBtn.disabled = true;
            userMessageCount++;
            
            setTimeout(() => {
                const response = getBotResponse(text);
                appendMessage('bot', response);
                chatbotInput.disabled = false; chatbotSendBtn.disabled = false;
                chatbotInput.focus();
            }, 1000);
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            msgDiv.innerHTML = text;
            chatbotMessages.appendChild(msgDiv);
            chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
        }

        chatbotFab.addEventListener('click', () => { chatbotWindow.classList.add('active'); chatbotFab.style.display = 'none'; });
        closeChatbotBtn.addEventListener('click', () => { chatbotWindow.classList.remove('active'); chatbotFab.style.display = 'flex'; });
        chatbotSendBtn.addEventListener('click', handleSend);
        chatbotInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleSend());

        // --- CAJA DINÁMICA ---
        function initDynamicBox() {
            const words = document.querySelectorAll('#dynamic-box .world-text');
            const box = document.getElementById('dynamic-box');
            let currentIndex = 0;
            function updateText() {
                words[currentIndex].classList.remove('active'); 
                currentIndex = (currentIndex + 1) % words.length; 
                words[currentIndex].classList.add('active');
                box.style.width = (words[currentIndex].offsetWidth + 80) + 'px'; 
            }
            document.fonts.ready.then(() => {
                words[0].classList.add('active'); 
                box.style.width = (words[0].offsetWidth + 80) + 'px';
                setInterval(updateText, 3000);
            });
        }

        function triggerIntro() {
            document.getElementById('intro-loader').classList.remove('hidden');
            setTimeout(() => document.getElementById('intro-loader').classList.add('hidden'), 2500);
        }

        window.onload = () => { initDynamicBox(); document.getElementById('intro-loader').classList.add('hidden'); };
    </script>
</body>
</html>
