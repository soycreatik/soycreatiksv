<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento - Creatik</title>
    <style>
        /* Estilos generales para centrar todo en pantalla */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
            font-family: system-ui, -apple-system, sans-serif;
            color: #333;
        }

        .maintenance-container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }

        /* Spinner de carga animado */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin-bottom: 10px;
            color: #2d2d2d;
        }

        p {
            color: #666;
            line-height: 1.5;
        }

        .brand {
            font-weight: bold;
            color: #007bff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="loader"></div>
        <h2>Sitio en mantenimiento</h2>
        <p>Estamos realizando mejoras técnicas para ofrecerte una mejor experiencia. Volveremos pronto.</p>
        <span class="brand">Creatik Agencia</span>
    </div>

</body>
</html>
